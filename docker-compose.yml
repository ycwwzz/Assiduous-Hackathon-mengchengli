version: '3.8'
services:
  backend:
    build: ./backend
    container_name: autopilot_backend
    ports:
      - "8000:8000"
    environment:
      - ALPHA_VANTAGE_API_KEY=your key
      - OPENAI_API_KEY=your key
    volumes:
      - ./chroma_data:/app/chroma_data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: autopilot_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped